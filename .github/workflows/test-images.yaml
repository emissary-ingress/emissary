---
name: Test Docker Images

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: ${{ github.ref }}
        description: Git ref to checkout
      artifact-bundle-prefix:
        type: string
        required: true
        description: Prefix for artifact bundle from build workflow
      version:
        type: string
        required: true
        description: >-
          Image version built by build-images (used as the chart image tag
          override so Emissary runs the locally-loaded image).

permissions:
  contents: read

jobs:
  test-images:
    name: Test ${{ matrix.arch }} Images
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install Deps
        uses: ./.github/actions/setup-deps

      - name: Install k3d
        run: |
          # Install k3d using the official method
          wget -q -O - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create k3d cluster
        run: |
          k3d cluster create test-cluster-${{ matrix.arch }} \
            --api-port 6443 \
            --port "80:80@loadbalancer" \
            --port "443:443@loadbalancer" \
            --port "6789:6789@loadbalancer" \
            --k3s-arg "--disable=traefik@server:*" \
            --wait

          # Verify cluster is ready
          kubectl cluster-info --context k3d-test-cluster-${{ matrix.arch }}

      - name: Prepare Artifacts Directory
        shell: bash
        run: |-
          mkdir -p ${{ github.workspace }}/artifacts/images

      - name: Download Docker Image Artifacts
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact-bundle-prefix }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/artifacts/images

      - id: load-k3d-images
        name: Load Images into k3d cluster
        run: |
          echo 'Loading images from:'
          ls ${{ github.workspace }}/artifacts/images/

          # Import the image tarballs directly into k3d cluster
          k3d image import ${{ github.workspace }}/artifacts/images/*-${{ matrix.arch }}-image.tar -c test-cluster-${{ matrix.arch }}

          echo "Images imported into k3d cluster"

      - name: Download Helm Chart Artifacts
        uses: actions/download-artifact@v6
        with:
          name: charts
          path: ${{ github.workspace }}/artifacts/charts

      - name: Install Emissary CRDs
        run: |
          set -euo pipefail
          helm install emissary-crds \
            ${{ github.workspace }}/artifacts/charts/emissary-crds-*.tgz \
            --namespace emissary-system \
            --create-namespace \
            --wait --timeout 3m

      - name: Install Emissary-ingress
        env:
          VERSION: ${{ inputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          kubectl create namespace emissary
          helm install emissary-ingress \
            ${{ github.workspace }}/artifacts/charts/emissary-ingress-*.tgz \
            --namespace emissary \
            -f ${{ github.workspace }}/test/e2e/helm-values.yaml \
            --set image.repository=ghcr.io/emissary-ingress/emissary \
            --set image.tag="${VERSION}-${ARCH}" \
            --set image.pullPolicy=IfNotPresent \
            --set replicaCount=1 \
            --set createDefaultListeners=true
          kubectl -n emissary rollout status deploy/emissary-ingress --timeout=3m

      - name: Build kat-client
        run: |
          set -euo pipefail
          mkdir -p ${{ github.workspace }}/tools/bin
          go build -o ${{ github.workspace }}/tools/bin/kat-client ./cmd/kat-client

      - name: Install Chainsaw
        env:
          CHAINSAW_VERSION: 0.2.14
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/kyverno/chainsaw/releases/download/v${CHAINSAW_VERSION}/chainsaw_linux_${{ matrix.arch }}.tar.gz" \
            | tar -xz -C ${{ github.workspace }}/tools/bin chainsaw
          chmod +x ${{ github.workspace }}/tools/bin/chainsaw

      - name: Run E2E Fixtures
        env:
          GATEWAY_URL: http://localhost
          KAT_CLIENT: ${{ github.workspace }}/tools/bin/kat-client
          KAT_SERVER_IMAGE: ghcr.io/emissary-ingress/kat-server:${{ inputs.version }}-${{ matrix.arch }}
        run: |
          ${{ github.workspace }}/tools/bin/chainsaw test \
            --config ${{ github.workspace }}/test/e2e/.chainsaw.yaml \
            ${{ github.workspace }}/test/e2e/fixtures

      - name: Dump Diagnostics on Failure
        if: failure()
        run: |
          kubectl get nodes
          kubectl get ns
          kubectl -n emissary get all
          kubectl -n emissary describe pod -l app.kubernetes.io/name=emissary-ingress || true
          kubectl -n emissary logs -l app.kubernetes.io/name=emissary-ingress --tail=500 || true

      - name: Cleanup k3d cluster
        if: always()
        run: |
          k3d cluster delete test-cluster-${{ matrix.arch }} || true
